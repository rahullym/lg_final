<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager | Logistics Gurukul</title>
    <style>
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
      #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background-color: #f8fafc; z-index: 9999; }
      .card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); width: 100%; max-width: 340px; border: 1px solid #e2e8f0; box-sizing: border-box; }
      .logo { color: #2563eb; font-weight: 900; font-size: 1.25rem; margin-bottom: 0.5rem; letter-spacing: -0.025em; text-align: center; }
      h2 { margin: 0 0 1.5rem 0; color: #0f172a; font-size: 1.5rem; text-align: center; }
      input { width: 100%; padding: 0.875rem; margin-top: 0.5rem; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 1rem; transition: border-color 0.2s; font-family: inherit; }
      input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px #bfdbfe; }
      button { width: 100%; padding: 0.875rem; margin-top: 1.25rem; background-color: #2563eb; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 1rem; transition: background-color 0.2s; font-family: inherit; }
      button:hover:not(:disabled) { background-color: #1d4ed8; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .message { color: #dc2626; margin-top: 1rem; font-size: 0.875rem; background: #fef2f2; padding: 0.5rem; border-radius: 4px; text-align: center; }
    </style>
  </head>
  <body>
    <div id="login-screen">
      <div class="card">
        <div class="logo">Logistics Gurukul</div>
        <h2>CMS Login</h2>
        <form id="loginForm">
          <input type="text" name="username" placeholder="Username" required autofocus autocomplete="username" />
          <input type="password" name="password" placeholder="Password" required autocomplete="current-password" />
          <button type="submit" id="submitBtn">Sign In</button>
        </form>
        <div id="errorMsg" class="message" style="display:none"></div>
      </div>
    </div>

    <script>
      const AUTH_ENDPOINT = 'https://decap-oauth-proxy.rahul-06a.workers.dev/auth/verify';

      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const btn = document.getElementById('submitBtn');
        const errorEl = document.getElementById('errorMsg');
        errorEl.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Signing in…';

        try {
          const res = await fetch(AUTH_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: form.username.value,
              password: form.password.value,
            }),
          });

          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.error || 'Login failed');
          }

          const { token } = await res.json();
          bootCMS(token);
        } catch (err) {
          errorEl.textContent = err.message || 'Login failed. Please try again.';
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign In';
        }
      });

      // Boot Decap CMS with the token already obtained.
      // Decap's github backend expects to open a popup and exchange messages
      // with it. We override window.open to return a fake window that emits
      // the success message immediately, so the user never sees a popup.
      function bootCMS(token) {
        document.getElementById('login-screen').style.display = 'none';

        const payload = JSON.stringify({ token, provider: 'github' });
        const origin = window.location.origin;
        const originalOpen = window.open;

        window.open = function (url) {
          if (url && String(url).includes('/auth')) {
            const fakeWin = {
              closed: false,
              close() { this.closed = true; },
              postMessage(msg) {
                if (msg === 'authorizing:github') {
                  setTimeout(() => {
                    window.postMessage(
                      'authorization:github:success:' + payload,
                      origin,
                    );
                  }, 0);
                }
              },
            };
            setTimeout(() => {
              window.postMessage('authorizing:github', origin);
            }, 50);
            return fakeWin;
          }
          return originalOpen.apply(this, arguments);
        };

        const s = document.createElement('script');
        // Pinned to 3.1.3 — later 3.x releases shipped a media-library UI
        // regression that renders the picker modal with overlapping search
        // and vertically-stacked action buttons. Bump this only after
        // verifying the media picker still renders cleanly.
        s.src = 'https://unpkg.com/decap-cms@3.1.3/dist/decap-cms.js';
        document.body.appendChild(s);
      }
    </script>
  </body>
</html>
