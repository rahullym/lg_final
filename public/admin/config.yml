backend:
  name: github
  repo: Lymdata-Labs-Private-Limited/lguru
  branch: main
  base_url: https://decap-oauth-proxy.rahul-06a.workers.dev
  auth_endpoint: /auth

# Where uploaded images are stored on disk (relative to repo root)
media_folder: public/images/uploads
# How those images are referenced in content
public_folder: /images/uploads

collections:
  - name: blog
    label: Blog Posts
    label_singular: Blog Post
    folder: src/content/posts
    create: true
    slug: "{{slug}}"
    format: yaml-frontmatter
    extension: md
    identifier_field: title
    summary: "{{title}}  —  {{category}}  ·  {{date}}  ·  {{draft | ternary('DRAFT', 'Published')}}"
    sortable_fields: [title, date, category, author]
    view_filters:
      - label: Drafts
        field: draft
        pattern: true
      - label: Published
        field: draft
        pattern: false
    view_groups:
      - label: Category
        field: category
      - label: Author
        field: author
    fields:
      - label: Permalink
        name: permalink
        widget: string
        required: true

      - label: Title
        name: title
        widget: string
        required: true

      - label: Excerpt
        name: excerpt
        widget: text
        required: true
        hint: "A short summary for SEO and post previews."

      - label: Cover Image
        name: image
        widget: image
        required: false
        allow_multiple: false

      - label: Author
        name: author
        widget: string
        default: "Admin"

      - label: Publish Date
        name: date
        widget: string
        required: true
        hint: "Format: Month DD, YYYY (e.g. March 30, 2026)"

      - label: Category
        name: category
        widget: string
        required: true

      - label: Draft
        name: draft
        widget: boolean
        default: false
        required: false
        hint: "Toggle ON to save without publishing."

      - label: Content
        name: body
        widget: markdown
        modes: ["raw"]
        editor_components: []

  - name: celebrations
    label: "Life @ Gurukul — Celebrations"
    label_singular: Celebration
    folder: src/content/celebrations
    create: true
    slug: "{{slug}}"
    format: yaml-frontmatter
    extension: md
    identifier_field: title
    summary: "{{title}}  —  {{year}}  ·  {{draft | ternary('DRAFT', 'Published')}}"
    sortable_fields: [order, title, year]
    view_filters:
      - { label: Drafts, field: draft, pattern: true }
      - { label: Published, field: draft, pattern: false }
    view_groups:
      - { label: Year, field: year }
    fields:
      - label: Title
        name: title
        widget: string
        required: true
      - label: Year
        name: year
        widget: string
        required: true
        hint: "e.g. 2025"
      - label: Cover Image
        name: cover
        widget: image
        required: true
      - label: Gallery
        name: gallery
        widget: list
        field: { label: Image, name: image, widget: image }
        required: false
        hint: "Upload multiple photos for this event."
      - label: Display Order
        name: order
        widget: number
        default: 0
        value_type: int
        required: false
        hint: "Lower numbers appear first."
      - label: Draft
        name: draft
        widget: boolean
        default: false
        required: false
      - label: Description
        name: body
        widget: markdown
        modes: ["raw"]
        editor_components: []
        required: false
        hint: "Optional rich text description."

  - name: seminars
    label: "Life @ Gurukul — Seminars & Events"
    label_singular: Seminar / Event
    folder: src/content/seminars
    create: true
    slug: "{{slug}}"
    format: yaml-frontmatter
    extension: md
    identifier_field: title
    summary: "{{title}}  —  {{year}}  ·  {{draft | ternary('DRAFT', 'Published')}}"
    sortable_fields: [order, title, year]
    view_filters:
      - { label: Drafts, field: draft, pattern: true }
      - { label: Published, field: draft, pattern: false }
    view_groups:
      - { label: Year, field: year }
    fields:
      - label: Title
        name: title
        widget: string
        required: true
      - label: Year
        name: year
        widget: string
        required: true
      - label: Cover Image
        name: cover
        widget: image
        required: true
      - label: Gallery
        name: gallery
        widget: list
        field: { label: Image, name: image, widget: image }
        required: false
      - label: Display Order
        name: order
        widget: number
        default: 0
        value_type: int
        required: false
      - label: Draft
        name: draft
        widget: boolean
        default: false
        required: false
      - label: Description
        name: body
        widget: markdown
        modes: ["raw"]
        editor_components: []
        required: false

  - name: infrastructure-features
    label: "Life @ Gurukul — Infrastructure Features"
    label_singular: Infrastructure Feature
    folder: src/content/infrastructure-features
    create: true
    slug: "{{slug}}"
    format: yaml-frontmatter
    extension: md
    identifier_field: title
    summary: "{{title}}  —  {{theme}} / {{align}}  ·  {{draft | ternary('DRAFT', 'Published')}}"
    sortable_fields: [order, title, theme]
    view_filters:
      - { label: Drafts, field: draft, pattern: true }
      - { label: Published, field: draft, pattern: false }
      - { label: Dark theme, field: theme, pattern: dark }
      - { label: Light theme, field: theme, pattern: light }
    view_groups:
      - { label: Theme, field: theme }
    fields:
      - label: Title
        name: title
        widget: string
        required: true
      - label: Description
        name: description
        widget: text
        required: true
      - label: Image
        name: image
        widget: image
        required: false
      - label: Image Alignment
        name: align
        widget: select
        options: ["left", "right"]
        default: "left"
        hint: "Which side the image appears on."
      - label: Theme
        name: theme
        widget: select
        options: ["light", "dark"]
        default: "light"
      - label: Key Points
        name: points
        widget: list
        field: { label: Point, name: point, widget: string }
        required: false
      - label: Display Order
        name: order
        widget: number
        default: 0
        value_type: int
        required: false
      - label: Draft
        name: draft
        widget: boolean
        default: false
        required: false
      - label: Extended Content
        name: body
        widget: markdown
        modes: ["raw"]
        editor_components: []
        required: false

  - name: infrastructure-gallery
    label: "Life @ Gurukul — Infrastructure Gallery"
    label_singular: Gallery Image
    folder: src/content/infrastructure-gallery
    create: true
    slug: "{{slug}}"
    format: yaml-frontmatter
    extension: md
    identifier_field: alt
    summary: "#{{order}}  ·  {{alt}}"
    sortable_fields: [order, alt]
    fields:
      - label: Alt Text
        name: alt
        widget: string
        required: true
      - label: Image
        name: image
        widget: image
        required: true
      - label: Display Order
        name: order
        widget: number
        default: 0
        value_type: int
        required: false
